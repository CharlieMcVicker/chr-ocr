<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Line Identification Spike Results</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 24px;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .column-section {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            border: 1px solid #334155;
        }
        .column-title {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            margin-top: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #475569;
            padding-bottom: 8px;
        }
        .column-ref {
            max-width: 300px;
            border-radius: 6px;
            border: 1px solid #475569;
            margin-bottom: 16px;
            display: block;
        }
        .lines-table {
            width: 100%;
            border-collapse: collapse;
        }
        .lines-table th {
            text-align: left;
            padding: 12px;
            background-color: #0f172a;
            color: #94a3b8;
            font-size: 14px;
            border-bottom: 2px solid #334155;
        }
        .lines-table td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            vertical-align: middle;
        }
        .line-img-container {
            background-color: #ffffff;
            padding: 8px;
            border-radius: 6px;
            display: inline-block;
        }
        .line-img {
            max-height: 48px;
            display: block;
        }
        .meta-text {
            font-family: monospace;
            font-size: 13px;
            color: #cbd5e1;
        }
        .confidence-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .conf-high {
            background-color: #064e3b;
            color: #6ee7b7;
        }
        .conf-med {
            background-color: #78350f;
            color: #fcd34d;
        }
        .conf-low {
            background-color: #7f1d1d;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <h1>Line Identification Spike Report</h1>
    <div class="subtitle">Input Image: 010101.png</div>

    <div class="column-section">
        <div class="column-title">Column 00 (BBox: [0.0, 0.0, 1085.0, 249.0])</div>

        <img class="column-ref" src="column_00.png" alt="Column 0">

        <table class="lines-table">
            <thead>
                <tr>
                    <th style="width: 80px;">Line #</th>
                    <th>Crop Image</th>
                    <th style="width: 250px;">BBox (relative)</th>
                    <th style="width: 120px;">Confidence</th>
                </tr>
            </thead>
            <tbody>

                <tr>
                    <td class="meta-text">#000</td>
                    <td>
                        <div class="line-img-container">
                            <img class="line-img" src="col_00_line_000.png" alt="Line 0">
                        </div>
                    </td>
                    <td class="meta-text">[0, 10, 1085, 95]</td>
                    <td>
                        <span class="confidence-badge conf-high">1.00</span>
                    </td>
                </tr>

                <tr>
                    <td class="meta-text">#001</td>
                    <td>
                        <div class="line-img-container">
                            <img class="line-img" src="col_00_line_001.png" alt="Line 1">
                        </div>
                    </td>
                    <td class="meta-text">[0, 88, 1085, 177]</td>
                    <td>
                        <span class="confidence-badge conf-high">0.98</span>
                    </td>
                </tr>

                <tr>
                    <td class="meta-text">#002</td>
                    <td>
                        <div class="line-img-container">
                            <img class="line-img" src="col_00_line_002.png" alt="Line 2">
                        </div>
                    </td>
                    <td class="meta-text">[0, 190, 243, 249]</td>
                    <td>
                        <span class="confidence-badge conf-high">0.90</span>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</body>
</html>
